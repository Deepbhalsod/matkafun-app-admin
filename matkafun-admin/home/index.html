<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Indian Quiz App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #3f1d38, #7c2d12);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            overflow: hidden;
        }

        /* ================= HEADER ================= */
        .header {
            background: linear-gradient(135deg, #71fb83, #0b65f5);
            color: #fff;
            padding: 22px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .35);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .user-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-size: 14px;
            opacity: .95;
        }

        /* ================= CONTENT ================= */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 90px;
        }

        /* ================= CATEGORY BOXES ================= */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .category-card {
            border-radius: 18px;
            padding: 26px 16px;
            text-align: center;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
            transition: .25s;
        }

        /* UNIQUE COLORS PER BOX */
        .category-card:nth-child(1) {
            background: linear-gradient(135deg, #22c55e, #15803d);
        }

        .category-card:nth-child(2) {
            background: linear-gradient(135deg, #38bdf8, #1d4ed8);
        }

        .category-card:nth-child(3) {
            background: linear-gradient(135deg, #f472b6, #9d174d);
        }

        .category-card:nth-child(4) {
            background: linear-gradient(135deg, #facc15, #b45309);
        }

        .category-card:nth-child(5) {
            background: linear-gradient(135deg, #a78bfa, #4c1d95);
        }

        .category-card:nth-child(6) {
            background: linear-gradient(135deg, #fb923c, #7c2d12);
        }

        .category-card:active {
            transform: scale(.94);
        }

        .category-icon {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .category-name {
            font-weight: 700;
            font-size: 14px;
        }

        /* ================= QUIZ ================= */
        .quiz-container {
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
            color: #f8fafc;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, .15);
            padding-bottom: 12px;
            margin-bottom: 20px;
            color: #000;
        }

        .question-number {
            font-weight: 700;
            color: #fbbf24;
        }

        .question-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #000;
            
        }

        /* ================= OPTIONS ================= */
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            color: #000;
        }

        .option {
            background: rgba(255, 255, 255, .12);
            border: 2px solid rgba(255, 255, 255, .15);
            border-radius: 14px;
            padding: 15px;
            color: #000;
            cursor: pointer;
            transition: .25s;
            
        }

        .option:active {
            transform: scale(.97);
        }

        .option.selected {
            background: #fb7185;
            border-color: #fb7185;
        }

        .option.correct {
            background: #22c55e;
            border-color: #22c55e;
        }

        .option.wrong {
            background: #dc2626;
            border-color: #dc2626;
        }

        .option.disabled {
            pointer-events: none;
            opacity: .7;
        }

        /* ================= BUTTON ================= */
        .next-btn {
            margin-top: 22px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #fb7185, #f59e0b);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .next-btn:active {
            transform: scale(.96);
        }

        .next-btn:disabled {
            opacity: .5
        }

        /* ================= RESULT ================= */
        .result-card {
            background: rgba(255, 255, 255, .1);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            color: #fff;
        }

        .result-score {
            font-size: 50px;
            font-weight: 800;
            background: linear-gradient(135deg, #facc15, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ================= LEADERBOARD ================= */
        .leaderboard-item {
            background: rgba(255, 255, 255, .08);
            border-radius: 14px;
            padding: 15px;
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .rank {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #000;
        }

        .rank.gold {
            background: #facc15;
        }

        .rank.silver {
            background: #e5e7eb;
        }

        .rank.bronze {
            background: #fb923c;
        }

        .player-score {
            font-weight: 800;
            color: #facc15;
        }

        /* ================= BOTTOM NAV ================= */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #2e1cb3;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -6px 20px rgba(0, 0, 0, .6);
        }

        .nav-item {
            flex: 1;
            text-align: center;
            color: #94a3b8;
        }

        .nav-item.active {
            color: #facc15;
        }

        /* ================= BACK ================= */
        .back-btn {
            background: #1e293b;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            margin-top: 15px;
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        @media(max-width:400px) {
            .categories-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🇮🇳 Indian Quiz App</h1>
            <div class="user-stats">
                <div class="stat-item">
                    <span>⭐</span>
                    <span id="userRating">0</span>
                </div>
                <div class="stat-item">
                    <span>🏆</span>
                    <span id="totalScore">0</span>
                </div>
                <div class="stat-item">
                    <span>📝</span>
                    <span id="quizzesCompleted">0</span>
                </div>
            </div>
        </div>

        <div class="content">
            <!-- Home Screen -->
            <div id="homeScreen">
                <h2 style="margin-bottom: 15px; color: #333;">Choose a Category</h2>
                <div class="categories-grid" id="categoriesGrid"></div>
            </div>

            <!-- Quiz Screen -->
            <div id="quizScreen" class="hidden">
                <div class="quiz-container">
                    <div class="question-header">
                        <span class="question-number" id="questionNumber">Question 1/5</span>
                        <span class="question-score">Score: <span id="currentScore">0</span></span>
                    </div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                    <button class="next-btn" id="nextBtn" disabled>Next Question</button>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="resultScreen" class="hidden">
                <div class="result-card">
                    <div class="result-icon">🎉</div>
                    <div class="result-title">Quiz Complete!</div>
                    <div class="result-score"><span id="finalScore">0</span>/5</div>
                    <div class="result-rating" id="resultRating"></div>
                    <p style="color: #666; margin: 15px 0;">Great job! Keep learning about India!</p>
                    <button class="next-btn" onclick="goHome()">Back to Home</button>
                </div>
            </div>

            <!-- Leaderboard Screen -->
            <div id="leaderboardScreen" class="hidden">
                <h2 style="margin-bottom: 20px; color: #333;">🏆 Leaderboard</h2>
                <div class="leaderboard-list" id="leaderboardList"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="showScreen('home')">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </div>
            <div class="nav-item" onclick="showScreen('leaderboard')">
                <div class="nav-icon">🏆</div>
                <div class="nav-label">Leaderboard</div>
            </div>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'history', name: 'History', icon: '🏛️', color: '#FF6B6B' },
            { id: 'geography', name: 'Geography', icon: '🗺️', color: '#4ECDC4' },
            { id: 'culture', name: 'Culture', icon: '🎭', color: '#FFE66D' },
            { id: 'sports', name: 'Sports', icon: '🏏', color: '#95E1D3' },
            { id: 'politics', name: 'Politics', icon: '⚖️', color: '#F38181' },
            { id: 'science', name: 'Science', icon: '🔬', color: '#AA96DA' }
        ];

        const questions = {
            history: [
                { q: 'Who was the first Prime Minister of India?', options: ['Mahatma Gandhi', 'Jawaharlal Nehru', 'Sardar Patel', 'Dr. Rajendra Prasad'], correct: 1 },
                { q: 'In which year did India gain independence?', options: ['1945', '1947', '1950', '1952'], correct: 1 },
                { q: 'Who wrote the Indian National Anthem?', options: ['Rabindranath Tagore', 'Bankim Chandra', 'Sarojini Naidu', 'Subhash Chandra Bose'], correct: 0 },
                { q: 'The Quit India Movement was launched in which year?', options: ['1940', '1942', '1944', '1946'], correct: 1 },
                { q: 'Who was known as the Iron Man of India?', options: ['Jawaharlal Nehru', 'Bhagat Singh', 'Sardar Vallabhbhai Patel', 'Subhash Chandra Bose'], correct: 2 }
            ],
            geography: [
                { q: 'Which is the longest river in India?', options: ['Yamuna', 'Ganga', 'Godavari', 'Brahmaputra'], correct: 1 },
                { q: 'How many states are there in India?', options: ['28', '29', '30', '31'], correct: 0 },
                { q: 'Which is the largest state in India by area?', options: ['Maharashtra', 'Madhya Pradesh', 'Rajasthan', 'Uttar Pradesh'], correct: 2 },
                { q: 'Where is the Thar Desert located?', options: ['Gujarat', 'Rajasthan', 'Punjab', 'Haryana'], correct: 1 },
                { q: 'Which is the highest mountain peak in India?', options: ['Nanda Devi', 'Kanchenjunga', 'K2', 'Mount Everest'], correct: 1 }
            ],
            culture: [
                { q: 'Which classical dance form originated in Tamil Nadu?', options: ['Kathak', 'Bharatanatyam', 'Odissi', 'Manipuri'], correct: 1 },
                { q: 'Which festival is known as the Festival of Lights?', options: ['Holi', 'Diwali', 'Dussehra', 'Eid'], correct: 1 },
                { q: 'Taj Mahal is located in which city?', options: ['Delhi', 'Jaipur', 'Agra', 'Lucknow'], correct: 2 },
                { q: 'Which is the oldest Veda?', options: ['Rig Veda', 'Sama Veda', 'Yajur Veda', 'Atharva Veda'], correct: 0 },
                { q: 'Who is known as the Father of Indian Cinema?', options: ['Raj Kapoor', 'Dadasaheb Phalke', 'Satyajit Ray', 'V. Shantaram'], correct: 1 }
            ],
            sports: [
                { q: 'Who is known as the God of Cricket?', options: ['Virat Kohli', 'MS Dhoni', 'Sachin Tendulkar', 'Kapil Dev'], correct: 2 },
                { q: 'In which year did India win its first Cricket World Cup?', options: ['1975', '1983', '2007', '2011'], correct: 1 },
                { q: 'Which Indian athlete won Gold in Javelin at Tokyo Olympics 2020?', options: ['Neeraj Chopra', 'PV Sindhu', 'Mirabai Chanu', 'Bajrang Punia'], correct: 0 },
                { q: 'National sport of India is?', options: ['Cricket', 'Hockey', 'Football', 'Kabaddi'], correct: 1 },
                { q: 'Who was the first Indian to win an individual Olympic Gold medal?', options: ['Abhinav Bindra', 'Neeraj Chopra', 'PV Sindhu', 'Karnam Malleswari'], correct: 0 }
            ],
            politics: [
                { q: 'How many fundamental rights are there in Indian Constitution?', options: ['5', '6', '7', '8'], correct: 1 },
                { q: 'Who is the first citizen of India?', options: ['Prime Minister', 'President', 'Chief Justice', 'Speaker'], correct: 1 },
                { q: 'When was the Indian Constitution adopted?', options: ['26 Jan 1950', '26 Nov 1949', '15 Aug 1947', '26 Jan 1949'], correct: 1 },
                { q: 'How many Lok Sabha seats are there?', options: ['543', '545', '550', '552'], correct: 1 },
                { q: 'Who is known as the Father of Indian Constitution?', options: ['Jawaharlal Nehru', 'Mahatma Gandhi', 'Dr. B.R. Ambedkar', 'Sardar Patel'], correct: 2 }
            ],
            science: [
                { q: 'Who is known as the Missile Man of India?', options: ['Vikram Sarabhai', 'APJ Abdul Kalam', 'Homi Bhabha', 'CV Raman'], correct: 1 },
                { q: 'ISRO headquarters is located in?', options: ['Mumbai', 'Bangalore', 'Hyderabad', 'Chennai'], correct: 1 },
                { q: 'Which Indian scientist won the Nobel Prize in Physics?', options: ['APJ Abdul Kalam', 'CV Raman', 'Homi Bhabha', 'Satyendra Nath Bose'], correct: 1 },
                { q: 'What was India\'s first satellite called?', options: ['Aryabhata', 'Bhaskara', 'INSAT', 'Rohini'], correct: 0 },
                { q: 'Who founded the Indian Space Research Organisation (ISRO)?', options: ['APJ Abdul Kalam', 'Vikram Sarabhai', 'Homi Bhabha', 'CV Raman'], correct: 1 }
            ]
        };

        let currentCategory = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;
        let userData = { totalScore: 0, quizzesCompleted: 0, rating: 0 };
        let leaderboard = [];

        // Load data from cache
        function loadData() {
            const savedUserData = localStorage.getItem('quizUserData');
            const savedLeaderboard = localStorage.getItem('quizLeaderboard');

            if (savedUserData) {
                userData = JSON.parse(savedUserData);
                updateUserStats();
            }

            if (savedLeaderboard) {
                leaderboard = JSON.parse(savedLeaderboard);
            } else {
                // Initialize with sample data
                leaderboard = [
                    { name: 'Raj Kumar', score: 45, quizzes: 15, rating: 5 },
                    { name: 'Priya Sharma', score: 42, quizzes: 12, rating: 5 },
                    { name: 'Amit Patel', score: 38, quizzes: 10, rating: 4 },
                    { name: 'Sneha Singh', score: 35, quizzes: 9, rating: 4 },
                    { name: 'Vikram Joshi', score: 32, quizzes: 8, rating: 4 }
                ];
                saveLeaderboard();
            }
        }

        // Save data to cache
        function saveData() {
            localStorage.setItem('quizUserData', JSON.stringify(userData));
        }

        function saveLeaderboard() {
            localStorage.setItem('quizLeaderboard', JSON.stringify(leaderboard));
        }

        function updateUserStats() {
            document.getElementById('userRating').textContent = userData.rating.toFixed(1);
            document.getElementById('totalScore').textContent = userData.totalScore;
            document.getElementById('quizzesCompleted').textContent = userData.quizzesCompleted;
        }

        // Initialize categories
        function initCategories() {
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = '';

            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.borderColor = cat.color;
                card.onclick = () => startQuiz(cat.id);
                card.innerHTML = `
                    <div class="category-icon">${cat.icon}</div>
                    <div class="category-name">${cat.name}</div>
                `;
                grid.appendChild(card);
            });
        }

        function startQuiz(categoryId) {
            currentCategory = categoryId;
            currentQuestionIndex = 0;
            score = 0;
            showScreen('quiz');
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            const question = questions[currentCategory][currentQuestionIndex];

            document.getElementById('questionNumber').textContent = `Question ${currentQuestionIndex + 1}/5`;
            document.getElementById('currentScore').textContent = score;
            document.getElementById('questionText').textContent = question.q;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option';
                optionEl.textContent = option;
                optionEl.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(optionEl);
            });

            document.getElementById('nextBtn').disabled = true;
        }

        function selectAnswer(selectedIndex) {
            if (answered) return;

            answered = true;
            const question = questions[currentCategory][currentQuestionIndex];
            const options = document.querySelectorAll('.option');

            options.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === question.correct) {
                    opt.classList.add('correct');
                }
                if (idx === selectedIndex && idx !== question.correct) {
                    opt.classList.add('wrong');
                }
            });

            if (selectedIndex === question.correct) {
                score++;
                document.getElementById('currentScore').textContent = score;
            }

            document.getElementById('nextBtn').disabled = false;
        }

        document.getElementById('nextBtn').onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < 5) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            showScreen('result');
            document.getElementById('finalScore').textContent = score;

            const rating = Math.ceil(score);
            const ratingContainer = document.getElementById('resultRating');
            ratingContainer.innerHTML = '';

            for (let i = 0; i < 5; i++) {
                ratingContainer.innerHTML += i < rating ? '⭐' : '☆';
            }

            // Update user data
            userData.totalScore += score;
            userData.quizzesCompleted++;
            userData.rating = userData.totalScore / userData.quizzesCompleted;
            saveData();
            updateUserStats();

            // Update leaderboard
            updateLeaderboard();
        }

        function updateLeaderboard() {
            const playerExists = leaderboard.find(p => p.name === 'You');

            if (playerExists) {
                playerExists.score = userData.totalScore;
                playerExists.quizzes = userData.quizzesCompleted;
                playerExists.rating = userData.rating;
            } else {
                leaderboard.push({
                    name: 'You',
                    score: userData.totalScore,
                    quizzes: userData.quizzesCompleted,
                    rating: userData.rating
                });
            }

            leaderboard.sort((a, b) => b.score - a.score);
            saveLeaderboard();
        }

        function showLeaderboard() {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';

            leaderboard.forEach((player, index) => {
                const item = document.createElement('div');
                item.className = 'leaderboard-item';

                let rankClass = '';
                if (index === 0) rankClass = 'gold';
                else if (index === 1) rankClass = 'silver';
                else if (index === 2) rankClass = 'bronze';

                const stars = '⭐'.repeat(Math.ceil(player.rating));

                item.innerHTML = `
                    <div class="rank ${rankClass}">${index + 1}</div>
                    <div class="player-info">
                        <div class="player-name">${player.name}</div>
                        <div class="player-stats">${stars} • ${player.quizzes} quizzes</div>
                    </div>
                    <div class="player-score">${player.score}</div>
                `;
                list.appendChild(item);
            });
        }

        function showScreen(screen) {
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('leaderboardScreen').classList.add('hidden');

            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));

            if (screen === 'home') {
                document.getElementById('homeScreen').classList.remove('hidden');
                navItems[0].classList.add('active');
            } else if (screen === 'quiz') {
                document.getElementById('quizScreen').classList.remove('hidden');
            } else if (screen === 'result') {
                document.getElementById('resultScreen').classList.remove('hidden');
            } else if (screen === 'leaderboard') {
                document.getElementById('leaderboardScreen').classList.remove('hidden');
                navItems[1].classList.add('active');
                showLeaderboard();
            }
        }

        function goHome() {
            showScreen('home');
        }

        // Initialize app
        loadData();
        initCategories();
    </script>
</body>

</html>
